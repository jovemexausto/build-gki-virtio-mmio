name: build-gki-android16-virtio-mmio-tpm

on:
  workflow_dispatch:

jobs:
  build-gki:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout capivara
        uses: actions/checkout@v4
        
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/share/boost
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get clean
          df -h
        
      - name: Add extra swap
        run: |
          sudo dd if=/dev/zero of=/mnt/extra-swapfile bs=1M count=8192
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev build-essential git curl repo \
            bc flex bison libssl-dev libelf-dev
          
          git config --global user.email "ci@capivara.dev"
          git config --global user.name "Capivara CI"
        
      - name: Repo sync (common-android16-6.12)
        run: |
          mkdir -p /tmp/kernel && cd /tmp/kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12 --depth=1
          repo sync -c -j$(nproc) -q --no-clone-bundle

      - name: Inject tpm_virtio driver into kernel tree
        run: |
          cp "$GITHUB_WORKSPACE/kernel/drivers/char/tpm/tpm_virtio.c" \
            /tmp/kernel/common/drivers/char/tpm/tpm_virtio.c
          
          KCONFIG="/tmp/kernel/common/drivers/char/tpm/Kconfig"
          if ! grep -q "TCG_VIRTIO" "$KCONFIG"; then
            printf '\nconfig TCG_VIRTIO\n\ttristate "Virtio TPM Interface"\n\tdepends on TCG_TPM && VIRTIO\n\thelp\n\t  This driver provides TPM via virtio transport.\n\t  The VMM exposes a virtio device (ID 29) with a single\n\t  virtqueue for TPM command/response exchange.\n\n\t  To compile as a module, choose M; module: tpm_virtio.\n' >> "$KCONFIG"
          fi
          
          MAKEFILE="/tmp/kernel/common/drivers/char/tpm/Makefile"
          if ! grep -q "tpm_virtio" "$MAKEFILE"; then
            echo "obj-\$(CONFIG_TCG_VIRTIO) += tpm_virtio.o" >> "$MAKEFILE"
          fi
          
          VIRTIO_IDS="/tmp/kernel/common/include/uapi/linux/virtio_ids.h"
          if ! grep -q "VIRTIO_ID_TPM" "$VIRTIO_IDS"; then
            sed -i '/^#endif/i #define VIRTIO_ID_TPM\t\t\t29 /* virtio TPM */' "$VIRTIO_IDS" || \
              echo "#define VIRTIO_ID_TPM 29" >> "$VIRTIO_IDS"
          fi
          
          echo "=== Injected files ==="
          ls -la /tmp/kernel/common/drivers/char/tpm/tpm_virtio.c
          grep -n "TCG_VIRTIO" "$KCONFIG"
          grep -n "tpm_virtio" "$MAKEFILE"
          grep "VIRTIO_ID_TPM" "$VIRTIO_IDS" || echo "VIRTIO_ID_TPM not in virtio_ids.h (fallback define in driver)"

      - name: Force kernel SUBLEVEL to match initramfs vermagic
        run: |
          cd /tmp/kernel/common
          echo "=== Before version patch ==="
          grep -E "^(VERSION|PATCHLEVEL|SUBLEVEL) =" Makefile || true
          # The current guest initramfs expects modules built for 6.12.89-android16-6-maybe-dirty-4k
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 89/' Makefile
          echo "=== After version patch ==="
          grep -E "^(VERSION|PATCHLEVEL|SUBLEVEL) =" Makefile || true
          
      - name: Patch defconfig
        run: |
          cd /tmp/kernel/common
          CONFIG="arch/arm64/configs/gki_defconfig"
          
          echo "=== Before patch ==="
          grep -n -E "VIRTIO_BALLOON|VIRTIO_MMIO|TCG|CRYPTO_USER|DEVPORT|DRM_VIRTIO" "$CONFIG" || true
          
          # Remove any previous attempts / negations
          sed -i '/^CONFIG_VIRTIO_MMIO=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_TPM=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_VTPM_PROXY=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_VIRTIO=/d' "$CONFIG"
          sed -i '/^CONFIG_CRYPTO_USER=/d' "$CONFIG"
          sed -i '/^# CONFIG_DRM_VIRTIO_GPU is not set$/d' "$CONFIG"
          sed -i '/^CONFIG_DRM_VIRTIO_GPU=/d' "$CONFIG"
          
          # Insert at exact anchor positions (confirmed by savedefconfig diff)
          sed -i '/^CONFIG_VIRTIO_BALLOON=m$/a CONFIG_VIRTIO_MMIO=y' "$CONFIG"
          sed -i '/^CONFIG_BUG_ON_DATA_CORRUPTION=y$/a CONFIG_CRYPTO_USER=y' "$CONFIG"
          sed -i '/^# CONFIG_DEVPORT is not set$/a CONFIG_TCG_TPM=y\nCONFIG_TCG_VIRTIO=y' "$CONFIG"
          sed -i '/^CONFIG_DRM=y$/a CONFIG_DRM_VIRTIO_GPU=y' "$CONFIG"
          
          echo ""
          echo "=== After patch ==="
          grep -n -E "VIRTIO_MMIO|TCG|CRYPTO_USER|DRM_VIRTIO" "$CONFIG"

      - name: Build kernel (aarch64)
        run: |
          cd /tmp/kernel
          echo "Building kernel..."
          ./tools/bazel run --config=local --lto=none //common:kernel_aarch64_dist -- --destdir=/tmp/kernel-dist/kernel
        
      - name: Collect artifacts
        run: |
          mkdir -p /tmp/artifacts

          echo "=== GKI module diagnostics ==="
          find /tmp/kernel-dist -name "failover.ko" -o -name "virtio_blk.ko" 2>/dev/null || true
          find /tmp/kernel-dist -name "*.ko" 2>/dev/null | sort | tee /tmp/artifacts/ko-list.txt || true
          
          for f in \
            /tmp/kernel-dist/kernel/Image \
            /tmp/kernel-dist/kernel/arch/arm64/boot/Image \
            /tmp/kernel-dist/kernel/boot.img; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/artifacts/
              echo "Found: $f"
            fi
          done

          # system_dlkm contains the GKI modules needed to rebuild initramfs.
          for f in \
            /tmp/kernel-dist/kernel/system_dlkm.img \
            /tmp/kernel-dist/kernel/system_dlkm_staging_archive.tar.gz; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/artifacts/
              echo "Found: $f"
            fi
          done
          
          while IFS= read -r ko; do
            rel="${ko#/tmp/kernel-dist/}"
            mkdir -p "/tmp/artifacts/$(dirname "$rel")"
            cp "$ko" "/tmp/artifacts/$rel"
          done < <(find /tmp/kernel-dist -name "*.ko" 2>/dev/null | sort)

          find /tmp/kernel -name "tpm_virtio.ko" -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true

          echo "=== Módulos coletados ==="
          find /tmp/artifacts -name "*.ko" 2>/dev/null | sort | head -30 || true
          
          echo ""
          echo "=== Final artifacts ==="
          ls -lhR /tmp/artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-android16-virtio-mmio-tpm-${{ github.run_id }}
          path: /tmp/artifacts/
          retention-days: 30
