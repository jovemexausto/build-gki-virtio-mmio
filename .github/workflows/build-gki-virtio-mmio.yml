name: build-gki-virtio-mmio-tpm

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Add extra swap
        run: |
          free -h
          sudo fallocate -l 8G /mnt/extra-swapfile || sudo dd if=/dev/zero of=/mnt/extra-swapfile bs=1M count=8192
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          free -h

      - name: Install repo tool
        run: |
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"

      - name: repo sync (common-android16-6.12-lts branch)
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          repo sync -c -j$(nproc) -q

      - name: Patch gki_defconfig for virtio-mmio and virtio-tpm (in-place)
        run: |
          cd kernel
          CONFIG_FILE="common/arch/arm64/configs/gki_defconfig"
          
          # Remove old entries if they exist (cleanup)
          sed -i '/^CONFIG_VIRTIO_MMIO=/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_VIRTIO_TPM=/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_CRYPTO_USER=/d' "$CONFIG_FILE"
          
          # Insert VIRTIO_MMIO after VIRTIO_BALLOON
          sed -i '/^CONFIG_VIRTIO_BALLOON=m$/a CONFIG_VIRTIO_MMIO=y\nCONFIG_VIRTIO_TPM=y' "$CONFIG_FILE"
          
          # Insert CRYPTO_USER after BUG_ON_DATA_CORRUPTION
          sed -i '/^CONFIG_BUG_ON_DATA_CORRUPTION=y$/a CONFIG_CRYPTO_USER=y' "$CONFIG_FILE"
          
          # Verify
          echo "=== Verification: VIRTIO section ==="
          grep -A2 "CONFIG_VIRTIO_BALLOON" "$CONFIG_FILE"
          echo ""
          echo "=== Verification: CRYPTO section ==="
          grep -A1 "CONFIG_BUG_ON_DATA_CORRUPTION" "$CONFIG_FILE"

      - name: Build kernel (no LTO, local config)
        run: |
          cd kernel
          tools/bazel run --config=local --lto=none //common:kernel_aarch64_dist -- --destdir=$(pwd)/dist/kernel

      - name: Build virtual_device modules (no LTO, local config)
        run: |
          cd kernel
          tools/bazel run --config=local --lto=none //common-modules/virtual-device:virtual_device_aarch64_dist -- --destdir=$(pwd)/dist/modules

      - name: Verify virtio_tpm in built kernel
        run: |
          cd kernel
          # Check for virtio_tpm module or builtin
          if find dist/modules -name "virtio_tpm.ko" 2>/dev/null | grep -q .; then
            echo "✓ virtio_tpm.ko found (module)"
          elif strings dist/kernel/Image | grep -q "CONFIG_VIRTIO_TPM=y"; then
            echo "✓ CONFIG_VIRTIO_TPM=y confirmed (builtin)"
          else
            echo "⚠ virtio_tpm status unknown — check log"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-virtio-mmio-tpm-${{ github.run_id }}
          path: |
            kernel/dist/kernel/**
            kernel/dist/modules/**
          retention-days: 30