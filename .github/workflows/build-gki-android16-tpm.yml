name: Build GKI Android 16 + TPM

on:
  workflow_dispatch:

jobs:
  build-gki:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h
        
      - name: Add extra swap
        run: |
          sudo dd if=/dev/zero of=/mnt/extra-swapfile bs=1M count=8192
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev build-essential git curl repo \
            gcc-aarch64-linux-gnu bc flex bison libssl-dev libelf-dev
          
          git config --global user.email "ci@capivara.dev"
          git config --global user.name "Capivara CI"
        
      - name: Repo sync (common-android16-6.12)
        run: |
          mkdir -p /tmp/kernel && cd /tmp/kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12
          repo sync -c -j$(nproc) -q
          
      - name: Patch and normalize defconfig
        run: |
          cd /tmp/kernel/common
          CONFIG="arch/arm64/configs/gki_defconfig"
          
          echo "=== Original (relevant lines) ==="
          grep -n -E "VIRTIO_BALLOON|VIRTIO_MMIO|TCG|CRYPTO_USER|BUG_ON_DATA" "$CONFIG" || true
          
          # Remove any previous attempts
          sed -i '/^CONFIG_VIRTIO_MMIO=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_TPM=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_VTPM_PROXY=/d' "$CONFIG"
          sed -i '/^CONFIG_CRYPTO_USER=/d' "$CONFIG"
          
          # Append all new configs at the end — savedefconfig will reorder them
          echo "CONFIG_VIRTIO_MMIO=y" >> "$CONFIG"
          echo "CONFIG_TCG_TPM=y" >> "$CONFIG"
          echo "CONFIG_TCG_VTPM_PROXY=y" >> "$CONFIG"
          echo "CONFIG_CRYPTO_USER=y" >> "$CONFIG"
          
          echo ""
          echo "=== Added to defconfig ==="
          tail -5 "$CONFIG"
          
          # NORMALIZE: run make savedefconfig so Bazel's check passes
          # This reorders configs and drops any that Kconfig doesn't recognize
          echo ""
          echo "=== Normalizing defconfig with savedefconfig ==="
          cd /tmp/kernel/common
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=/tmp/kernel-out gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=/tmp/kernel-out savedefconfig
          
          # Copy normalized defconfig back
          cp /tmp/kernel-out/defconfig "$CONFIG"
          rm -rf /tmp/kernel-out
          
          echo ""
          echo "=== Normalized defconfig (relevant lines) ==="
          grep -n -E "VIRTIO_MMIO|TCG|CRYPTO_USER" "$CONFIG" || echo "WARNING: configs not found after normalize!"
          
          # If TCG_VTPM_PROXY was dropped, report it clearly
          if ! grep -q "TCG_VTPM_PROXY" "$CONFIG"; then
            echo ""
            echo "!!! WARNING: CONFIG_TCG_VTPM_PROXY was dropped by savedefconfig !!!"
            echo "This means the Kconfig option doesn't exist or has unmet dependencies."
            echo "Checking what TCG options ARE available..."
            find . -name "Kconfig*" -path "*/tpm/*" -exec grep -l "VTPM" {} \; 2>/dev/null || echo "No VTPM Kconfig found"
            grep -r "TCG_VTPM_PROXY\|VTPM_PROXY" drivers/char/tpm/Kconfig 2>/dev/null || echo "TCG_VTPM_PROXY not in Kconfig"
          fi
        
      - name: Build kernel (aarch64)
        run: |
          cd /tmp/kernel
          echo "Building kernel..."
          ./tools/bazel run --config=local --lto=none //common:kernel_aarch64_dist -- --destdir=/tmp/kernel-dist/kernel
        
      - name: Build modules (virtual-device)
        run: |
          cd /tmp/kernel
          echo "Building modules..."
          ./tools/bazel run --config=local --lto=none //common-modules/virtual-device:virtual_device_aarch64_dist -- --destdir=/tmp/kernel-dist/modules
          
      - name: Collect artifacts
        run: |
          mkdir -p /tmp/artifacts
          
          # Kernel image - try multiple possible locations
          for f in \
            /tmp/kernel-dist/kernel/Image \
            /tmp/kernel-dist/kernel/arch/arm64/boot/Image \
            /tmp/kernel-dist/kernel/boot.img; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/artifacts/
              echo "Found: $f"
            fi
          done
          
          # Modules
          if [ -d "/tmp/kernel-dist/modules" ]; then
            cp -r /tmp/kernel-dist/modules/* /tmp/artifacts/ 2>/dev/null || true
          fi
          
          echo ""
          echo "=== Final artifacts ==="
          ls -lhR /tmp/artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-android16-tpm-${{ github.run_id }}
          path: /tmp/artifacts/
          retention-days: 30