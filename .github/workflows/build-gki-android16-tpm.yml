name: Build GKI Android 16 + TPM

on:
  workflow_dispatch:

jobs:
  build-gki:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h
        
      - name: Add extra swap
        run: |
          sudo dd if=/dev/zero of=/mnt/extra-swapfile bs=1M count=8192
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev build-essential git curl repo
          
          curl -fsSL https://bazel.build/bazel-release.pub.gpg | gpg --dearmor > /tmp/bazel-archive-keyring.gpg
          sudo mv /tmp/bazel-archive-keyring.gpg /usr/share/keyrings
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/bazel-archive-keyring.gpg] https://storage.googleapis.com/bazel-apt stable jdk1.8" | sudo tee /etc/apt/sources.list.d/bazel.list
          sudo apt-get update
          sudo apt-get install -y bazel
          
          git config --global user.email "ci@capivara.dev"
          git config --global user.name "Capivara CI"
        
      - name: Repo sync (common-android16-6.12)
        run: |
          mkdir -p /tmp/kernel && cd /tmp/kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12
          repo sync -c -j$(nproc) -q
          
      - name: Verify kernel structure
        run: |
          ls -lh /tmp/kernel/
          ls /tmp/kernel/common/arch/arm64/configs/
          
      - name: Patch kernel config
        run: |
          cd /tmp/kernel/common
          CONFIG="arch/arm64/configs/gki_defconfig"
          
          echo "=== Original config (snippet) ==="
          grep -E "VIRTIO_BALLOON|TCG|CRYPTO_USER" "$CONFIG" || echo "(não encontrados, vai adicionar)"
          
          # Remove duplicatas (se existirem)
          sed -i '/^CONFIG_VIRTIO_MMIO=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_VTPM_PROXY=/d' "$CONFIG"
          sed -i '/^CONFIG_CRYPTO_USER=/d' "$CONFIG"
          
          # Adiciona configs novas
          echo "CONFIG_VIRTIO_MMIO=y" >> "$CONFIG"
          echo "CONFIG_TCG_VTPM_PROXY=y" >> "$CONFIG"
          echo "CONFIG_CRYPTO_USER=y" >> "$CONFIG"
          
          echo ""
          echo "=== Configs adicionadas ==="
          grep -E "VIRTIO_MMIO|TCG_VTPM_PROXY|CRYPTO_USER" "$CONFIG"
        
      - name: Build kernel (aarch64)
        run: |
          cd /tmp/kernel
          echo "Building kernel..."
          ./tools/bazel run --config=local --lto=none //common:kernel_aarch64_dist -- --destdir=/tmp/kernel-dist/kernel
          ls -lh /tmp/kernel-dist/kernel/arch/arm64/boot/
        
      - name: Build modules (virtual-device)
        run: |
          cd /tmp/kernel
          echo "Building modules..."
          ./tools/bazel run --config=local --lto=none //common-modules/virtual-device:virtual_device_aarch64_dist -- --destdir=/tmp/kernel-dist/modules
          ls -lh /tmp/kernel-dist/modules/ 2>/dev/null || echo "modules dir não existe"
          
      - name: Collect artifacts
        run: |
          mkdir -p /tmp/artifacts/kernel /tmp/artifacts/modules
          
          echo "Copiando kernel..."
          cp /tmp/kernel-dist/kernel/arch/arm64/boot/Image /tmp/artifacts/kernel/gki-Image
          
          echo "Copiando módulos..."
          if [ -d "/tmp/kernel-dist/modules/lib/modules" ]; then
            cp -r /tmp/kernel-dist/modules/lib/modules/* /tmp/artifacts/modules/ 2>/dev/null || true
          else
            echo "⚠ Módulos não encontrados"
          fi
          
          echo ""
          echo "=== Artifacts finais ==="
          ls -lhR /tmp/artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-android16-tpm-${{ github.run_id }}
          path: /tmp/artifacts/
          retention-days: 30