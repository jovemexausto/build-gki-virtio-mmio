name: Build GKI Android 16 + TPM

on:
  workflow_dispatch:

jobs:
  build-gki:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h
        
      - name: Add extra swap
        run: |
          sudo dd if=/dev/zero of=/mnt/extra-swapfile bs=1M count=8192
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev build-essential git curl repo
          
          curl -fsSL https://bazel.build/bazel-release.pub.gpg | gpg --dearmor > /tmp/bazel-archive-keyring.gpg
          sudo mv /tmp/bazel-archive-keyring.gpg /usr/share/keyrings
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/bazel-archive-keyring.gpg] https://storage.googleapis.com/bazel-apt stable jdk1.8" | sudo tee /etc/apt/sources.list.d/bazel.list
          sudo apt-get update
          sudo apt-get install -y bazel
          
          git config --global user.email "ci@capivara.dev"
          git config --global user.name "Capivara CI"
        
      - name: Repo sync
        run: |
          mkdir -p /tmp/kernel && cd /tmp/kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12 -m common.xml
          repo sync -c -j$(nproc) -q
          
      - name: Patch kernel config
        run: |
          cd /tmp/kernel/common
          CONFIG="arch/arm64/configs/gki_defconfig"
          
          sed -i '/^CONFIG_VIRTIO_MMIO=/d' "$CONFIG"
          sed -i '/^CONFIG_TCG_VTPM_PROXY=/d' "$CONFIG"
          sed -i '/^CONFIG_CRYPTO_USER=/d' "$CONFIG"
          
          sed -i '/^CONFIG_VIRTIO_BALLOON=m$/a CONFIG_VIRTIO_MMIO=y' "$CONFIG"
          sed -i '/^CONFIG_TCG=y$/a CONFIG_TCG_VTPM_PROXY=y' "$CONFIG"
          sed -i '/^CONFIG_ASYMMETRIC_KEY_TYPE=y$/a CONFIG_CRYPTO_USER=y' "$CONFIG"
          
          echo "=== Configs adicionadas ==="
          grep -E "VIRTIO_MMIO|TCG_VTPM_PROXY|CRYPTO_USER" "$CONFIG"
        
      - name: Build kernel
        run: |
          cd /tmp/kernel/common
          tools/bazel run --config=local --lto=none //common:kernel_aarch64_dist -- --destdir="$(pwd)/dist/kernel"
        
      - name: Build modules
        run: |
          cd /tmp/kernel/common
          tools/bazel run --config=local --lto=none //common-modules/virtual-device:virtual_device_aarch64_dist -- --destdir="$(pwd)/dist/modules"
          
      - name: Collect artifacts
        run: |
          mkdir -p /tmp/artifacts
          cp /tmp/kernel/common/dist/kernel/arch/arm64/boot/Image /tmp/artifacts/gki-Image
          cp -r /tmp/kernel/common/dist/modules/lib/modules/* /tmp/artifacts/ 2>/dev/null || true
          ls -lh /tmp/artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-android16-tpm-${{ github.run_id }}
          path: /tmp/artifacts/
          retention-days: 30